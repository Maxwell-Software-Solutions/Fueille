<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e0e0e0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <!-- Floor -->
  <rect width="1200" height="800" fill="#f5f0e8"/>
  <rect width="1200" height="800" fill="url(#grid)"/>
  <!-- Walls -->
  <rect x="20" y="20" width="1160" height="760" fill="none" stroke="#8b7355" stroke-width="8" rx="4"/>
  <!-- Windows (south wall) -->
  <rect x="200" y="20" width="200" height="8" fill="#87ceeb" rx="2"/>
  <rect x="500" y="20" width="200" height="8" fill="#87ceeb" rx="2"/>
  <rect x="800" y="20" width="200" height="8" fill="#87ceeb" rx="2"/>
  <!-- Door -->
  <rect x="1140" y="350" width="8" height="120" fill="#deb887"/>
  <path d="M 1148 350 Q 1208 410 1148 470" fill="none" stroke="#deb887" stroke-width="1.5" stroke-dasharray="4"/>
  <!-- Sofa -->
  <rect x="400" y="500" width="400" height="120" rx="12" fill="#7b8fa1" stroke="#5a6d7d" stroke-width="2"/>
  <rect x="410" y="510" width="380" height="80" rx="8" fill="#8fa3b5"/>
  <text x="600" y="560" font-family="system-ui" font-size="16" fill="#fff" text-anchor="middle">Sofa</text>
  <!-- Coffee table -->
  <rect x="500" y="400" width="200" height="80" rx="6" fill="#c4956a" stroke="#a07850" stroke-width="2"/>
  <text x="600" y="445" font-family="system-ui" font-size="13" fill="#fff" text-anchor="middle">Coffee Table</text>
  <!-- TV stand -->
  <rect x="450" y="80" width="300" height="50" rx="4" fill="#555" stroke="#333" stroke-width="2"/>
  <text x="600" y="110" font-family="system-ui" font-size="13" fill="#ccc" text-anchor="middle">TV Stand</text>
  <!-- Bookshelf -->
  <rect x="50" y="60" width="100" height="300" rx="4" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="100" y="215" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle" transform="rotate(-90 100 215)">Bookshelf</text>
  <!-- Armchair -->
  <rect x="120" y="450" width="120" height="120" rx="16" fill="#9b7653" stroke="#7a5c3a" stroke-width="2"/>
  <text x="180" y="515" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle">Chair</text>
  <!-- Side table -->
  <circle cx="280" cy="510" r="30" fill="#c4956a" stroke="#a07850" stroke-width="2"/>
  <!-- Rug -->
  <rect x="350" y="350" width="500" height="300" rx="8" fill="#d4a76a" opacity="0.3" stroke="#c49450" stroke-width="1"/>
  <!-- Label -->
  <text x="600" y="750" font-family="system-ui" font-size="20" font-weight="600" fill="#666" text-anchor="middle">Living Room</text>
</svg>
