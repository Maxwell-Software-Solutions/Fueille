<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Floor -->
  <rect width="800" height="600" fill="#d4c4a0"/>
  <!-- Floor tiles -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#c4b490" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#c4b490" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#c4b490" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="#c4b490" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#c4b490" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#c4b490" stroke-width="1"/>
  <!-- Railing -->
  <rect x="0" y="0" width="800" height="40" rx="4" fill="#888" stroke="#666" stroke-width="2"/>
  <rect x="0" y="0" width="800" height="8" fill="#999"/>
  <!-- Railing posts -->
  <rect x="50" y="0" width="8" height="40" fill="#777"/>
  <rect x="150" y="0" width="8" height="40" fill="#777"/>
  <rect x="250" y="0" width="8" height="40" fill="#777"/>
  <rect x="350" y="0" width="8" height="40" fill="#777"/>
  <rect x="450" y="0" width="8" height="40" fill="#777"/>
  <rect x="550" y="0" width="8" height="40" fill="#777"/>
  <rect x="650" y="0" width="8" height="40" fill="#777"/>
  <rect x="750" y="0" width="8" height="40" fill="#777"/>
  <!-- Wall (building side) -->
  <rect x="0" y="560" width="800" height="40" fill="#a09080" stroke="#8a7a6a" stroke-width="2"/>
  <!-- Door -->
  <rect x="300" y="520" width="200" height="80" rx="4" fill="#c4b490" stroke="#a09080" stroke-width="2"/>
  <rect x="310" y="530" width="80" height="60" fill="#87ceeb" opacity="0.4" rx="2"/>
  <rect x="410" y="530" width="80" height="60" fill="#87ceeb" opacity="0.4" rx="2"/>
  <circle cx="485" cy="565" r="5" fill="#c4956a"/>
  <!-- Small table -->
  <circle cx="600" cy="300" r="50" fill="#c4956a" stroke="#a07850" stroke-width="2"/>
  <text x="600" y="305" font-family="system-ui" font-size="12" fill="#fff" text-anchor="middle">Table</text>
  <!-- Chair -->
  <rect x="540" y="380" width="50" height="50" rx="8" fill="#7b8fa1" stroke="#5a6d7d" stroke-width="2"/>
  <rect x="620" y="380" width="50" height="50" rx="8" fill="#7b8fa1" stroke="#5a6d7d" stroke-width="2"/>
  <!-- Plant shelf -->
  <rect x="50" y="80" width="180" height="30" rx="4" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="140" y="100" font-family="system-ui" font-size="11" fill="#fff" text-anchor="middle">Plant Shelf</text>
  <!-- Hanging rail -->
  <line x1="50" y1="60" x2="230" y2="60" stroke="#888" stroke-width="3"/>
  <!-- Corner shelf -->
  <rect x="680" y="80" width="80" height="80" rx="4" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="720" y="125" font-family="system-ui" font-size="11" fill="#fff" text-anchor="middle">Shelf</text>
  <!-- Sky indicator -->
  <rect x="0" y="0" width="800" height="3" fill="#87ceeb"/>
  <!-- Label -->
  <text x="400" y="500" font-family="system-ui" font-size="18" font-weight="600" fill="#666" text-anchor="middle">Balcony</text>
</svg>
